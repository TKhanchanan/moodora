services:
  postgres:
    image: postgres:16
    container_name: moodora-postgres
    environment:
      POSTGRES_USER: moodora
      POSTGRES_PASSWORD: moodora
      POSTGRES_DB: moodora_db
    ports:
      - "5432:5432"
    volumes:
      - moodora_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: moodora-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: moodora-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: moodora
      MINIO_ROOT_PASSWORD: moodora123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - moodora_minio_data:/data

volumes:
  moodora_postgres_data:
  moodora_minio_data:
